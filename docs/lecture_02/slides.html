<h2 id="abundance">Abundance</h2>
<blockquote>
<p>&quot;[J]ust as the invention of the telescope revolutionized the study of the heavens, so too the technological revolution in mobile, Web, and Internet communications has the potential to revolutionize our understanding of ourselves and how we interact.&quot;</p>
</blockquote>
<p>— Watts (2012)</p>
<div class="footnote">Watts, D.J. (2012). <em>Everything is Obvious: Once You Know the Answer</em>. Crown Business.</div>

<h3 id="what-digital-trace-data-gives-you-access-to">What Digital Trace Data Gives You Access To</h3>

<ul>
<li data-marpit-fragment="1"><strong>Discourse and culture</strong> — what people say, how they frame issues, what narratives and categories circulate</li>
<li data-marpit-fragment="2"><strong>Social relations</strong> — who connects to whom, communities, networks of interaction and influence</li>
<li data-marpit-fragment="3"><strong>Change over time</strong> — how debates emerge, peak, and fade; how things diffuse; longitudinal dynamics at scale</li>
<li data-marpit-fragment="4"><strong>Activity and behavior</strong> — posting, liking, sharing, commenting; the rhythm and intensity of participation</li>
<li data-marpit-fragment="5"><strong>Identity and self-presentation</strong> — profiles, bios, group memberships, self-descriptions</li>
<li data-marpit-fragment="6"><strong>Scale</strong> — thousands or millions of observations that no interview study could reach</li>
</ul>
</section>

<h3 id="online-data-abundant-but-partial">Online Data: Abundant but Partial</h3>
<ul>
<li data-marpit-fragment="1"><strong>Coverage</strong> — not everyone is equally present (demographics, access, motivation)</li>
<li data-marpit-fragment="2"><strong>Observability</strong> — platforms surface some things and hide others (algorithms, deletion, private groups, front-stage vs. back-stage)</li>
<li data-marpit-fragment="3"><strong>Affordance</strong> — even with complete data, some forms of social life simply don't happen here; the platform only makes certain action repertoires possible</li>
</ul>

<h3 id="what-is-a-topic">What is a Topic?</h3>
<ul>
<li>
<p>Simply a device to concentrate your attention on some things and not others.</p>
</li>
<li>
<p>You can use heuristics to rearrange elements in order to view your topic from a new perspective.</p>
</li>
</ul>

<h3 id="some-questionable-rules-for-questions">Some Questionable Rules for Questions</h3>
<p><strong>General Rules:</strong></p>
<ul>
<li data-marpit-fragment="1">You should be able to answer your question.</li>
<li data-marpit-fragment="2">You should learn something after answering your question.</li>
<li data-marpit-fragment="3">You should not know the answer beforehand.</li>
<li data-marpit-fragment="4">Your first question formulation is not your final formulation.</li>
</ul>
</section>

<h2 id="%F0%9F%94%8D-what-%E2%80%93-descriptive--definitional-questions"><img class="emoji" draggable="false" alt="🔍" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f50d.svg" data-marp-twemoji=""/> What – Descriptive / Definitional Questions</h2>
<p><strong>Purpose</strong>: To identify, define, or categorize a phenomenon.</p>
<p><strong>Use when</strong> you want to know what something is, characterize a phenomenon, or identify the types of things that exist.</p>

<li>What deservingness evaluations do Ukrainian refugee volunteers use?</li>

<p><strong>Purpose</strong>: To explore settings, locations, or spatial patterns.</p>
<p><strong>Use when</strong> place, context, or institutional setting is relevant to your topic.</p>
<p><strong>Examples</strong>:</p>
<ul>

<p><strong>Purpose</strong>: To explore reasons, causes, or motivations.</p>
<p><strong>Use when</strong> you want to understand underlying forces or intentions.</p>

<h3 id="mixed-method-motives">Mixed Method Motives</h3>
<ul>
<li data-marpit-fragment="1">Motivated by the specific research question/problem</li>
<li data-marpit-fragment="2">Two overall justifications: <strong>confirmatory</strong> and <strong>complementary</strong></li>
</ul>

<table>
<thead>
<tr>
<th></th>
<th>Purpose</th>
<th>Example</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Confirmatory</strong></td>
<td>Confirm/reject a finding using a different method</td>
<td>Discrimination in hiring: surveys (attitudes) + audit studies (behaviour)</td>
</tr>
<tr>
<td><strong>Complementary</strong></td>
<td>Answer different aspects with different methods</td>
<td>Trust and activism: survey (correlation) + interviews (mechanisms)</td>
</tr>
</tbody>
</table>
</section>

<h3 id="why-digital-data-need-qualitative-strategies">Why Digital Data Need Qualitative Strategies</h3>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>Without it...</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Casing</strong></td>
<td>We mis-specify our object of study</td>
</tr>
<tr>
<td><strong>Grounding</strong></td>
<td>We misunderstand our observations</td>
</tr>
<tr>
<td><strong>Theorizing</strong></td>
<td>We can't exploit surprising findings</td>
</tr>
<tr>
<td><strong>Validating</strong></td>
<td>We can't trust our quantitative measures</td>
</tr>
</tbody>
</table>
<div class="footnote">Carlsen, H.B., Astrupgaard, S.L., Blok, A., & Pedersen, M.A. (forthcoming). Why and How Digital Data Need Qualitative Research Strategies. In <em>Qualitative Methods in the Big Data Revolution</em>. Oxford University Press.</div>
</section>

<h3 id="offline-vs-online-grounding-with-qualitative-methods">Offline vs Online Grounding with Qualitative Methods</h3>
<ul>
<li data-marpit-fragment="1">Sometimes, we need to move beyond online data to properly ground our analysis</li>
<li data-marpit-fragment="2">Many times, online observations provide a valuable resource for qualitative data</li>
<li data-marpit-fragment="3">New mixed methods approaches allow moving between qualitative and quantitative data</li>
<li data-marpit-fragment="4">Grigoropoulou &amp; Small focus on the application of traditional qualitative methods</li>
</ul>
<div class="footnote">Grigoropoulou, N. & Small, M.L. (2022). The data revolution in social science needs qualitative research. <em>Nature Human Behaviour</em>, 6, 904–906.</div>

<h4 id="cool-aspects-of-digital-text-data">Cool Aspects of Digital Text Data</h4>
<ul>
<li data-marpit-fragment="1">
<p><strong>Computational methods assist qualitative analysis</strong></p>
<ul>
<li data-marpit-fragment="2">Ensure saturation</li>
<li data-marpit-fragment="3">Guard against bias in qualitative analysis</li>
<li data-marpit-fragment="4">Enable discovery by alternative means</li>
</ul>
</li>
<li data-marpit-fragment="5">
<p><strong>Qual and Quant Analysis of the Same Observations</strong></p>
<ul>
<li data-marpit-fragment="6">Ensure data integration</li>
<li data-marpit-fragment="7">Ensure analytical integration (scale qualitative categories)</li>
<li data-marpit-fragment="8">Allow us to revisit observations</li>
</ul>
</li>
</ul>
